<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Nunito:wght@400;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-800">

    <!-- Navigation Bar -->
    <nav>
        <div class="max-w-7xl mx-auto px-4 base:px-6 lg:px-8">
            <div class="flex items-center justify-between h-full pt-4">
                <div class="flex items-center">
                    <a href="index.html" class="font-handwriting text-4xl flex items-center">
                        CareerCompass
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="index.html" class="px-3 py-2 rounded-md text-base font-medium">Recommender</a>
                    <a href="jobs.html" class="px-3 py-2 rounded-md text-base font-medium">All Jobs</a>
                    <a href="resources.html" class="px-3 py-2 rounded-md text-base font-medium">Resources</a>
                    <a href="quiz.html" class="px-3 py-2 rounded-md text-base font-medium">Personality Quiz</a>
                    <a href="about.html" class="px-3 py-2 rounded-md text-base font-medium">About Us</a>
                    <a href="counseling.html" class="px-3 py-2 rounded-md text-base font-medium">Book Counseling</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
         <div id="quiz-view" class="view">
             <div class="scrapbook-card rotate-neg-1 p-8 rounded-2xl max-w-3xl mx-auto">
                <h2 class="font-handwriting text-5xl text-center mb-2">Who are you, really?</h2>
                <p class="text-center text-gray-600 mb-8">A super quick quiz to find your secret strengths!</p>
                <div id="quiz-container"></div>
                <div id="quiz-result" class="hidden text-center"></div>
            </div>
        </div>
    </main>

    <!-- Modals (needed for quiz alerts) -->
    <div id="alert-modal" class="modal-overlay hidden">
        <div class="modal-content scrapbook-card bg-rose-100 text-rose-800 text-center">
            <h3 class="font-handwriting text-3xl mb-2">Whoops!</h3>
            <p id="alert-message" class="mb-4">You forgot to answer all the questions!</p>
            <button id="close-alert-btn" class="bg-rose-500 text-white font-bold py-2 px-4 rounded-lg">Got it</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
