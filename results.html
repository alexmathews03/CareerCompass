<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - Career Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Nunito:wght@400;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-full pt-4">
                <div class="flex items-center">
                    <a href="index.html" class="font-handwriting text-4xl flex items-center">
                        CareerCompass
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="index.html" class="px-3 py-2 rounded-md text-base font-medium">Recommender</a>
                    <a href="jobs.html" class="px-3 py-2 rounded-md text-base font-medium">All Jobs</a>
                    <a href="resources.html" class="px-3 py-2 rounded-md text-base font-medium">Resources</a>
                    <a href="quiz.html" class="px-3 py-2 rounded-md text-base font-medium">Personality Quiz</a>
                    <a href="about.html" class="px-3 py-2 rounded-md text-base font-medium">About Us</a>
                    <a href="counseling.html" class="px-3 py-2 rounded-md text-base font-medium">Book Counseling</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="scrapbook-card p-8 md:p-12">
            <!-- Job Title and Description -->
            <div class="text-center border-b-2 border-dashed border-stone-300 pb-8">
                <h1 id="job-title" class="font-handwriting text-5xl md:text-6xl text-[#c4593b]">Job Title</h1>
                <p id="job-description" class="mt-4 text-lg text-[#40262b]">Job description goes here.</p>
            </div>

            <!-- Roadmap Section -->
            <div class="mt-12">
                <h2 class="font-handwriting text-4xl text-center text-[#40262b] mb-8">Your Recommended Path</h2>
                <!-- Flowchart will be generated here by script.js -->
                <div id="roadmap-container"></div>
            </div>

            <!-- Resources Section -->
            <div class="mt-12 border-t-2 border-dashed border-stone-300 pt-8">
                 <h2 class="font-handwriting text-4xl text-center text-[#40262b] mb-8">Helpful Resources</h2>
                 <ul id="resources-list" class="space-y-2 text-center text-lg">
                     <!-- Resources will be added here by script.js -->
                 </ul>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
