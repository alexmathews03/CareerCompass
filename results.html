<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - Recommendations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Nunito:wght@400;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-800">

    <!-- Navigation Bar -->
    <nav>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-full pt-4">
                <div class="flex items-center">
                    <a href="index.html" class="font-handwriting text-4xl flex items-center">
                        CareerCompass
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="jobs.html" class="px-3 py-2 rounded-md text-base font-medium">All Jobs</a>
                    <a href="resources.html" class="px-3 py-2 rounded-md text-base font-medium">Resources</a>
                    <a href="quiz.html" class="px-3 py-2 rounded-md text-base font-medium">Personality Quiz</a>
                    <a href="counseling.html" class="px-3 py-2 rounded-md text-base font-medium">Book Counseling</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="text-center">
            <h1 class="font-handwriting text-5xl md:text-6xl text-gray-900">Your Recommendations</h1>
            <p class="mt-4 text-gray-650 text-base max-w-xl mx-auto">
                Here are the career paths matching your interests and study background. Select any path to explore the interactive step-by-step roadmap!
            </p>
        </div>
        
        <!-- Job cards container -->
        <div id="job-cards-container" class="mt-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full">Analyzing your future paths...</p>
        </div>

        <div class="mt-12 text-center">
            <a href="index.html" class="button-primary inline-block">
                &larr; Take Recommender Again
            </a>
        </div>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
